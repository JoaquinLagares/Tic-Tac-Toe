<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div>
        <h1>Tic-Tac-Toe</h1>
    </div>
    <div>
        <div>
            <label for="">Player 1</label>
            <input type="text" class="name" id="player1">
        </div>
        <div>
            <label for="">Player 2</label>
            <input type="text" class="name" id="player2">
        </div>
        <button id="start">Start Game</button>
    </div>
    <div>
        <div id="board">
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
        </div>

        <p id="message"></p>
        <button id="restart">Restart</button>

    </div>
    <script src="main.js"></script>
</body>

</html>
